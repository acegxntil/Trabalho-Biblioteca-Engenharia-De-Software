<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="fragments :: head('Sugestoes Pendentes - SGBU')"></head>
<body>
    <div th:replace="fragments :: navbar"></div>
    <div th:replace="fragments :: alertas"></div>

    <div class="container">
        <div class="row mb-4">
            <div class="col">
                <h2><i class="bi bi-lightbulb"></i> Sugestoes de Aquisicao</h2>
                <p class="text-muted">Sugestoes enviadas por usuarios aguardando analise.</p>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>Data</th>
                                <th>Usuario</th>
                                <th>Titulo Sugerido</th>
                                <th>Autor</th>
                                <th>Justificativa</th>
                                <th>Status</th>
                                <th>Acao</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${sugestoes}">
                                <td th:text="${#temporals.format(s.dataSugestao, 'dd/MM/yyyy')}">01/01/2024</td>
                                <td th:text="${s.usuario.nome}">Usuario</td>
                                <td th:text="${s.tituloSugerido}">Titulo</td>
                                <td th:text="${s.autorSugerido}">Autor</td>
                                <td>
                                    <span th:if="${s.justificativa}" th:text="${#strings.abbreviate(s.justificativa, 50)}">Justificativa</span>
                                    <span th:unless="${s.justificativa}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${s.status.name() == 'PENDENTE' ? 'bg-warning text-dark' : 'bg-success'}"
                                          th:text="${s.status}">PENDENTE</span>
                                </td>
                                <td>
                                    <form th:action="@{/sugestoes/analisar/{id}(id=${s.idSugestao})}" method="post"
                                          th:if="${s.status.name() == 'PENDENTE'}">
                                        <button type="submit" class="btn btn-sm btn-success"
                                                onclick="return confirm('Marcar esta sugestao como analisada?')">
                                            <i class="bi bi-check"></i> Analisar
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(sugestoes)}">
                                <td colspan="7" class="text-center text-muted">Nenhuma sugestao pendente</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments :: scripts"></div>
</body>
</html>
