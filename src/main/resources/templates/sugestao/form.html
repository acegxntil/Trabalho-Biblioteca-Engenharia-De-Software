<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="fragments :: head('Sugerir Titulo - SGBU')"></head>
<body>
    <div th:replace="fragments :: navbar"></div>
    <div th:replace="fragments :: alertas"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2><i class="bi bi-lightbulb"></i> Sugerir Aquisicao de Titulo</h2>
                <p class="text-muted">Utilize este formulario para sugerir a aquisicao de novos titulos para o acervo da biblioteca.</p>
                <div class="card shadow">
                    <div class="card-body">
                        <form th:action="@{/sugestoes/salvar}" th:object="${sugestao}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Titulo do Livro <span class="text-danger">*</span></label>
                                <input type="text" th:field="*{tituloSugerido}" class="form-control" placeholder="Titulo completo do livro" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Autor(es)</label>
                                <input type="text" th:field="*{autorSugerido}" class="form-control" placeholder="Nome do autor ou autores">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Justificativa</label>
                                <textarea th:field="*{justificativa}" class="form-control" rows="4"
                                          placeholder="Explique por que este titulo seria importante para o acervo..."></textarea>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary py-2">
                                    <i class="bi bi-send"></i> Enviar Sugestao
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments :: scripts"></div>
</body>
</html>
