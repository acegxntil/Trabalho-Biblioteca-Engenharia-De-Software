<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <title>SGBU - Redefinir Senha</title>
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-book display-1 text-primary"></i>
                    <h1 class="h3">Redefinir Senha</h1>
                </div>
                <div class="card shadow">
                    <div class="card-body p-4">
                        <div th:if="${param.erro}" class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> <span th:text="${param.erro}"></span>
                        </div>
                        <form th:action="@{/redefinir-senha}" method="post">
                            <input type="hidden" name="token" th:value="${token}">
                            <div class="mb-3">
                                <label for="senha" class="form-label">Nova Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" id="senha" name="senha" class="form-control" placeholder="Nova senha" required minlength="6">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="confirmacaoSenha" class="form-label">Confirmar Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" id="confirmacaoSenha" name="confirmacaoSenha" class="form-control" placeholder="Confirme a senha" required minlength="6">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                <i class="bi bi-check-circle"></i> Redefinir Senha
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
