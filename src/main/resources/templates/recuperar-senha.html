<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <title>SGBU - Recuperar Senha</title>
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-book display-1 text-primary"></i>
                    <h1 class="h3">Recuperar Senha</h1>
                </div>
                <div class="card shadow">
                    <div class="card-body p-4">
                        <div th:if="${param.erro}" class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> <span th:text="${param.erro}"></span>
                        </div>
                        <p class="text-muted">Informe seu email cadastrado para receber o link de redefinicao de senha.</p>
                        <form th:action="@{/recuperar-senha}" method="post">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">
                                <i class="bi bi-send"></i> Enviar Link
                            </button>
                        </form>
                        <div class="text-center mt-3">
                            <a th:href="@{/login}" class="text-decoration-none">
                                <i class="bi bi-arrow-left"></i> Voltar ao Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
